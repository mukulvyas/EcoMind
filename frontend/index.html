      .skip-link {
        position: absolute;
        top: -100%;

        padding: 8px 16px;

        font-weight: 600;
        z-index: 9999;
        border-radius: 0 0 8px 0;

        text-decoration: none;
      }
      .skip-link:focus {
        top: 0;
      }
    </style>
