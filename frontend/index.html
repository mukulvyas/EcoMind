<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/eco-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EcoMind — AI-powered carbon footprint awareness platform. Track, understand, and reduce your carbon impact with personalised insights powered by Google Gemini." />
    <meta name="theme-color" content="#1D9E75" />
    <meta name="color-scheme" content="light" />
    <!-- Open Graph -->
    <meta property="og:title" content="EcoMind | AI Carbon Footprint Coach" />
    <meta property="og:description" content="Know your impact. Change your future. Track and reduce your carbon footprint with AI-powered personalised insights." />
    <meta property="og:type" content="website" />
    <title>EcoMind | AI Carbon Footprint Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* Skip-to-content link for keyboard/screen reader accessibility */
      .skip-link {
        position: absolute;
        top: -100%;
        left: 0;
        background: #1D9E75;
        color: #fff;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 600;
        z-index: 9999;
        border-radius: 0 0 8px 0;
        transition: top 0.2s;
        text-decoration: none;
      }
      .skip-link:focus {
        top: 0;
      }
    </style>
  </head>
  <body>
    <!-- Skip navigation for keyboard users -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root" role="application" aria-label="EcoMind Carbon Footprint Coach"></div>
    <!-- JSON-LD structured data for search engines and problem-statement traceability -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "EcoMind",
      "description": "AI-powered carbon footprint tracking and reduction platform for Indian users. Calculates, tracks, and reduces personal CO₂ emissions with personalised insights powered by Google Gemini.",
      "url": "https://ecomind.app",
      "applicationCategory": "EnvironmentApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "featureList": [
        "Carbon footprint calculator with India-specific emission factors",
        "AI coach powered by Google Gemini for personalised reduction advice",
        "Utility bill OCR and CO₂ extraction",
        "30-day personalised action plans",
        "Real-time government environmental data (CEA, CPCB, PPAC, MoEFCC)"
      ],
      "creator": {
        "@type": "Organization",
        "name": "EcoMind"
      }
    }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
